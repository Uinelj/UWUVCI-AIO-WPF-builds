name: Build Releases

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Build Release
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v1
        with:
          nuget-version: latest

      - name: Restore NuGet Packages
        run: nuget restore "UWUVCI AIO WPF.sln"

      - name: Build Release
        run: msbuild "UWUVCI AIO WPF.sln" /p:Configuration=Release /p:Platform="Any CPU" /p:OutputPath="bin\Release" /t:Rebuild /m /p:RunAnalyzersDuringBuild=false /p:SignManifests=false /p:GenerateManifests=false /p:ManifestKeyFile=""

      - name: Prepare Release Bundle
        run: |
          # Create a clean output directory
          $outputDir = "UWUVCI AIO WPF\bin\Release"
          $bundleDir = "release-bundle"
          New-Item -ItemType Directory -Force -Path $bundleDir
          
          # Copy only essential files (exclude .xml and .pdb documentation/debug files)
          Get-ChildItem -Path $outputDir -Filter "*.exe" | Copy-Item -Destination $bundleDir
          Get-ChildItem -Path $outputDir -Include "*.dll" | Where-Object { $_.Extension -eq ".dll" } | Copy-Item -Destination $bundleDir
          Get-ChildItem -Path $outputDir -Filter "*.config" | Copy-Item -Destination $bundleDir
          
          # Remove any XML or PDB files that got copied
          Remove-Item -Path "$bundleDir\*.xml" -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "$bundleDir\*.pdb" -Force -ErrorAction SilentlyContinue
          
          Copy-Item -Path "$outputDir\Resources" -Destination $bundleDir -Recurse -ErrorAction SilentlyContinue
          
          # List what we're releasing
          Write-Host "Release bundle contents:"
          Get-ChildItem -Path $bundleDir -Recurse | Select-Object FullName

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UWUVCI-AIO-WPF-windows
          path: release-bundle/**/*

  package-macos:
    name: Package macOS DMG
    needs: build
    runs-on: macos-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: UWUVCI-AIO-WPF-windows
          path: app

      - name: Create DMG
        run: |
          # Create app bundle structure for DMG
          mkdir -p "UWUVCI AIO WPF.app/Contents/MacOS"
          mkdir -p "UWUVCI AIO WPF.app/Contents/Resources"
          
          # Copy all Windows files to the app bundle
          cp -R app/* "UWUVCI AIO WPF.app/Contents/MacOS/"
          
          # Create a README for macOS users
          cat > "UWUVCI AIO WPF.app/Contents/Resources/ReadMe.txt" << 'EOF'
          UWUVCI AIO WPF - Wii U Injector
          
          This is a Windows .NET Framework application that runs under Wine/CrossOver.
          
          To run on macOS:
          1. Install CrossOver (https://www.codeweavers.com/crossover) or Wine
          2. Install .NET Framework 4.8 in your Wine/CrossOver bottle
          3. Run UWUVCI AIO WPF.exe from this folder
          
          The application has built-in Wine detection for proper operation.
          EOF
          
          # Create DMG
          hdiutil create -volname "UWUVCI AIO WPF" -srcfolder "UWUVCI AIO WPF.app" -ov -format UDZO "UWUVCI-AIO-WPF-mac.dmg"

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UWUVCI-AIO-WPF-macos
          path: UWUVCI-AIO-WPF-mac.dmg

  create-release:
    name: Create GitHub Release
    needs: [build, package-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: UWUVCI-AIO-WPF-windows
          path: release

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: UWUVCI-AIO-WPF-macos
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## UWUVCI-AIO-WPF Release ${{ github.ref_name }}

            ### Downloads
            - **Windows**: UWUVCI-AIO-WPF-windows.zip (contains all required files)
            - **macOS**: UWUVCI-AIO-WPF-mac.dmg (for Wine/CrossOver)
            - **Linux**: Run the Windows build under Wine (install .NET Framework 4.8 in your Wine prefix)

            ### Notes for Linux/macOS Users
            This application has built-in Wine detection via `MacLinuxHelper.cs`. For the best experience:
            - Use Wine with .NET Framework 4.8 installed
            - On macOS, open the DMG and run the EXE via CrossOver/Wine
            - Consider using CrossOver or Lutris for easier setup
          draft: false
          prerelease: false
          files: |
            UWUVCI-AIO-WPF-mac.dmg
            release/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}