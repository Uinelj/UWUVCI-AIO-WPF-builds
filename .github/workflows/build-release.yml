name: Build Releases

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: Build Release
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v1
        with:
          nuget-version: latest

      - name: Restore NuGet Packages
        run: nuget restore "UWUVCI AIO WPF.sln"

      - name: Build Release
        run: msbuild "UWUVCI AIO WPF.sln" /p:Configuration=Release /p:Platform="Any CPU" /p:OutputPath="bin\Release" /t:Rebuild /m /p:RunAnalyzersDuringBuild=false /p:SignManifests=false /p:GenerateManifests=false /p:ManifestKeyFile=""

      - name: Prepare Release Bundle
        run: |
          # Create a clean output directory
          $outputDir = "UWUVCI AIO WPF\bin\Release"
          $bundleDir = "release-bundle"
          New-Item -ItemType Directory -Force -Path $bundleDir
          
          # Copy only essential files (exclude .xml and .pdb documentation/debug files)
          Get-ChildItem -Path $outputDir -Filter "*.exe" | Copy-Item -Destination $bundleDir
          Get-ChildItem -Path $outputDir -Include "*.dll" | Where-Object { $_.Extension -eq ".dll" } | Copy-Item -Destination $bundleDir
          Get-ChildItem -Path $outputDir -Filter "*.config" | Copy-Item -Destination $bundleDir
          
          # Remove any XML or PDB files that got copied
          Remove-Item -Path "$bundleDir\*.xml" -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "$bundleDir\*.pdb" -Force -ErrorAction SilentlyContinue
          
          Copy-Item -Path "$outputDir\Resources" -Destination $bundleDir -Recurse -ErrorAction SilentlyContinue
          
          # List what we're releasing
          Write-Host "Release bundle contents:"
          Get-ChildItem -Path $bundleDir -Recurse | Select-Object FullName

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UWUVCI-AIO-WPF-windows
          path: release-bundle/**/*

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: UWUVCI-AIO-WPF-windows
          path: release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## UWUVCI-AIO-WPF Release ${{ github.ref_name }}

            ### Downloads
            - **Windows**: UWUVCI AIO WPF.exe (includes all required DLLs)
            - **Linux**: Run the Windows build under Wine (install .NET Framework 4.8 in your Wine prefix)
            - **macOS**: Run the Windows build under Wine/CrossOver (install .NET Framework 4.8 in your Wine prefix)

            ### Notes for Linux/macOS Users
            This application has built-in Wine detection via `MacLinuxHelper.cs`. For the best experience:
            - Use Wine with .NET Framework 4.8 installed
            - Consider using CrossOver or Lutris for easier setup
            
            ### Included Files
            - `UWUVCI AIO WPF.exe` - Main application
            - `*.dll` - Required dependencies
            - `UWUVCI AIO WPF.exe.config` - Application configuration
          draft: false
          prerelease: false
          files: release/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}